# Reproducible runtime config for the gsfluent backend container.
#
# One command to bring it up:
#   docker compose -f docker/compose.yml up -d
#
# Every knob is an env var (.env file at the repo root is read
# automatically, or set them inline). All paths below are HOST paths
# mounted into the container — the container itself stays stateless.
#
# Auto-restart is wired via the image's HEALTHCHECK + the
# `restart: unless-stopped` policy below: if /api/health fails 4×
# consecutively, Docker marks the container unhealthy and restarts it.
# Logs are rotated so the container doesn't fill the host disk.

services:
  backend:
    image: gsfluent-backend:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: ${CONTAINER_NAME:-gsfluent-backend}
    restart: unless-stopped

    ports:
      - "${BACKEND_PORT:-8080}:8080"

    # Volumes:
    #   work/        ← sequences, .npz cache, uploaded models (persist on host)
    #   sim env      ← optional, only when this host actually runs sims
    volumes:
      - ${WORK_HOST_DIR:-./work}:/app/work
      # Mount the canonical sim install if this host runs sims. For
      # API-only deployments (e.g. a viewer on a laptop), leave this
      # commented and the runner will return a clear error if a sim
      # is requested.
      # - ${SIM_HOST_DIR:-/opt/gsfluent-sim}:/opt/gsfluent-sim:ro

    environment:
      - GSFLUENT_SIM_HOME=${GSFLUENT_SIM_HOME:-/opt/gsfluent-sim}
      - GSFLUENT_SIM_PYTHON=${GSFLUENT_SIM_PYTHON:-python}
      - GSFLUENT_SIM_SCRIPT_RUNNER=${GSFLUENT_SIM_SCRIPT_RUNNER:-/app/tools/run_sim.sh}
      - GSFLUENT_NPZ_REBUILD=${GSFLUENT_NPZ_REBUILD:-1}

    # The HEALTHCHECK lives in the Dockerfile so a plain `docker run`
    # also benefits. Compose surfaces the health in `docker compose ps`.
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/api/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 10s

    # Cap container log volume at 100 MB across 5 files; without this
    # docker writes indefinitely to /var/lib/docker which fills small
    # laptop disks fast.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # GPU access: ONLY uncomment if you also mount a sim env and want
    # the runner to spawn GPU-backed sims inside the container. The
    # default image has no CUDA runtime; this is purely a future
    # opt-in once the sim layer Dockerfile lands.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
