name: gsfluent
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      # CUDA-bound: setup.sh swaps the index to match the host's CUDA version.
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch>=2.4
      - torchvision
      - torchaudio
      - warp-lang>=1.5
      - taichi>=1.7
      - viser>=0.2
      - plyfile
      - scipy
      - numpy
      - opencv-python
      - scikit-learn
      - open3d
      - imageio
      - tqdm
