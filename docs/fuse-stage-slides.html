<header>gsfluent · fuse 阶段</header>
<h2 id="%E8%BE%93%E5%85%A5%E4%B8%8E%E8%BE%93%E5%87%BA">输入与输出</h2>
<p><strong>输入：</strong></p>
<ul>
<li>参考 .ply — 建筑静止状态的 3DGS（683k splat，含 xyz / scale / rotation / opacity / rgb / SH）</li>
<li>每帧 sim ply — <code>sim_NNNN.ply</code>（仿真粒子位置约 200k，particle_F 模式下额外带 cov）</li>
</ul>
<p><strong>输出：</strong></p>
<ul>
<li>每帧融合 ply — <code>frame_NNNN.ply</code>（完整 3DGS 格式，按时间演化）</li>
</ul>
<div class="deepdive">
<p>3DGS 每个 splat 有约 60 个浮点数（位置、形状、朝向、颜色、SH）。<br />
MPM 只算位置和形变 —— 颜色跟物理方程无关，硬塞进去只会拖慢仿真。<br />
所以让仿真专心算物理，把视觉属性留给 fuse 补。</p>
</div>
<footer>2026-05-18</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-background-color="#fff" data-header="gsfluent · fuse 阶段" data-footer="2026-05-18" data-theme="default" data-style="section {

<h2 id="%E5%9C%A8%E6%95%B4%E4%BD%93%E6%B5%81%E6%B0%B4%E7%BA%BF%E4%B8%AD%E7%9A%84%E4%BD%8D%E7%BD%AE">在整体流水线中的位置</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌──────────┐    ┌──────────┐    ┌──────────┐    ┌──────────┐

<div class="deepdive">
<p>为什么不让仿真直接出可渲染的 3DGS？</p>
<ul>
<li>仿真不知道颜色（只跟踪位置、速度、形变梯度）</li>
<li>仿真为速度跑 200k，渲染要保持原模型 683k 的细节密度</li>
<li>模块化：fuse 是纯几何映射，换 PBD / SPH 也能用同一套</li>
</ul>
</div>

<table>

<p>直接拿 200k 渲染：丢掉 70% 视觉细节<br />

<p><strong>fuse = 用 200k 个物理样本，&quot;补&quot;出 683k 个渲染样本</strong></p>
<div class="deepdive">
<p>图形学的经典套路：<strong>粗物理 + 精渲染</strong>。<br />
Pixar 毛发用 ~10k 引导曲线驱动 ~1M 渲染细丝；<br />
游戏角色用 ~100 蒙皮骨骼驱动 ~50k 顶点。<br />
共同点：物理在粗粒度上算，渲染在细粒度上补。</p>
</div>

<p><strong>字段构成：</strong> xyz × 3 · scale × 3 · rot × 4 · opacity × 1 · SH × 48</p>
<div class="deepdive">
<p>3DGS 把不透明度存成 <strong>logit</strong>、把尺度存成 <strong>log</strong> —— 训练时希望参数是无界实数（梯度下降友好），渲染前再用 sigmoid / exp 映回 [0, 1] 和正数。直接存物理量会在饱和区让梯度消失。</p>
<p>SH（球谐函数）= 跟视角有关的颜色。0 阶就是基础 RGB，高阶是反光、半透明等修正项。</p>

<h2 id="%E6%AD%A5%E9%AA%A4-5rest-%E5%AF%B9%E5%BA%94%E6%98%A0%E5%B0%84%E6%A0%B8%E5%BF%83%E9%80%89%E6%8B%A9">步骤 5：rest 对应映射（核心选择）</h2>
<p><strong>两条路线：</strong></p>
<ul>
<li><strong>K-NN（旧）：</strong> 每个参考 splat 跟踪最近 8 个仿真粒子的<strong>加权平均</strong></li>
<li><strong>1-NN（particle_F 新）：</strong> 每个参考 splat <strong>刚性绑定</strong>到 1 个仿真粒子</li>
</ul>
<div class="deepdive">
<p>整个 fuse 阶段<strong>最重要的设计决策</strong>。两种路线对应两种失败方式：</p>
<ul>
<li>K-NN 偏&quot;过度平滑&quot; → 裂缝被涂抹，出现鬼影</li>
<li>1-NN 偏&quot;过度刚性&quot; → 多个 splat 共享同一粒子的粗形状</li>
</ul>
<p>物理仿真里有专门的名字：<strong>连续介质 vs 离散单元</strong>。</p>

<h2 id="%E6%AD%A5%E9%AA%A4-5--k-nn-%E8%B7%AF%E5%BE%84">步骤 5 · K-NN 路径</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">sim_tree = cKDTree(sim_xyz_t0_kept)
dists, knn_idx = sim_tree.query(ref_xyz_norm, k=<span class="hljs-number">8</span>)
inv_d = <span class="hljs-number">1.0</span> / (dists + <span class="hljs-number">1e-6</span>)
knn_weights = inv_d / inv_d.<span class="hljs-built_in">sum</span>(axis=<span class="hljs-number">1</span>, keepdims=<span class="hljs-literal">True</span>)
</code></pre>
<p>类比：角色动画里的<strong>线性混合蒙皮（LBS）</strong></p>
<div class="deepdive">
<p>K 太小（4）：邻居覆盖不够，加权场不连续。<br />
K 太大（16）：邻居跨远距离，一个 splat 听到整面墙。<br />
K=8 是 3D 空间 LBS 的经验最佳点。</p>
<p>反距离权重无需选超参；高斯权重要调带宽 σ，对粒子密度敏感。</p>
</div>

<h2 id="%E6%AD%A5%E9%AA%A4-5--particle_f-1-nn-%E8%B7%AF%E5%BE%84">步骤 5 · particle_F 1-NN 路径</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">sim_tree_pf = cKDTree(sim_xyz_t0_kept)
_, pf_1nn_idx = sim_tree_pf.query(ref_xyz_norm, k=<span class="hljs-number">1</span>)
pf_ref_rest_offset = ref_xyz_norm - sim_xyz_t0_kept[pf_1nn_idx]
</code></pre>
<p>每个参考 splat 刚性绑定到一个仿真粒子，记录 rest 偏移</p>
<div class="deepdive">
<p>这是有限元法（FEM）的标准做法 —— 节点之间用 shape function 插值，最简单的就是 nearest-node。</p>
<p>为什么要记 rest 偏移？<br />
如果直接把 splat 吸到粒子位置，~3 个共享同粒子的 splat 会塌缩成一个点。<br />
带上偏移，splat 就像顶点蒙皮上骨骼一样，<strong>飘</strong>在它代表的那块材料里。</p>
</div>

<h2 id="%E6%AD%A5%E9%AA%A4-7a--k-nn-%E5%8A%A0%E6%9D%83%E4%BD%8D%E7%A7%BB">步骤 7a · K-NN 加权位移</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">sim_disp = sim_kept - sim_xyz_t0_kept           <span class="hljs-comment"># 每个粒子的位移</span>
neighbors = sim_disp[knn_idx]                    <span class="hljs-comment"># (n_ref, 8, 3)</span>
ref_disp = (knn_weights * neighbors).<span class="hljs-built_in">sum</span>(axis=<span class="hljs-number">1</span>) <span class="hljs-comment"># 加权平均</span>
ref_xyz_displaced = ref_xyz_norm + ref_disp
</code></pre>
<p><strong>关键：平均&quot;位移&quot;，不是&quot;位置&quot;</strong></p>
<div class="deepdive">
<p>例子：8 个邻居静止时聚在 (0,0,0)，splat 在 (0.1, 0, 0)。</p>
<ul>
<li>平均<strong>位置</strong> → 粒子塌缩到 (0,0,0)，splat 也被拉过去，<strong>细节丢失</strong></li>
<li>平均<strong>位移</strong> → 粒子位移都是 0，splat 仍在 (0.1, 0, 0)，<strong>细节保留</strong></li>
</ul>
<p>位移对常数项不敏感，叠加不破坏 splat 跟粒子的相对位置。</p>
</div>

<h2 id="particle_f--%E6%95%B0%E5%AD%A6%E7%BB%86%E8%8A%82">particle_F · 数学细节</h2>
<p>线性变换 <code>x' = A·x</code> 作用在协方差上：<code>Σ' = A·Σ·Aᵀ</code></p>
<p>各向同性放缩 <code>A = extent·I</code> →</p>
<ul>
<li>位置：一阶，乘 <code>extent</code></li>
<li>协方差：二阶，乘 <code>extent²</code></li>
</ul>
<div class="deepdive">
<p>为什么要 eigendecomp？</p>
<p>3DGS 不直接存协方差矩阵，存的是 (rotation, scale)，合成时算 <code>Σ = R · diag(s²) · Rᵀ</code>。</p>
<p>逆过程就是 eigh：给定对称正定 Σ，eigvecs 就是 R 的列，eigvals 就是 s²。<br />
从 R 抽 quaternion，对 s² 开方取 log 得到 log_scale。</p>
</div>

<h2 id="%E4%B8%8B%E4%B8%80%E6%AD%A5f-skinning">下一步：F-skinning</h2>
