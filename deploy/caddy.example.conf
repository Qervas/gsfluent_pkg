# Caddy reverse proxy for the gsfluent backend — HTTP/2 termination.
#
# Drops in front of the uvicorn process supervised by
# `deploy/gsfluent-backend.service` (or .dev.service). uvicorn does NOT
# speak HTTP/2 natively (as of late 2025); switching the ExecStart to
# hypercorn would work but is operational churn. Caddy is the cheap
# path: terminate HTTP/2 + TLS at the edge, then talk plain HTTP/1.1
# over loopback to uvicorn. Browsers + the SPA see HTTP/2 (multiplexed
# streams, header compression, no head-of-line blocking on the
# `/api/sequences/*/cache/splats.gsq` body while a `/state` poll fires).
#
# Bonus: Caddy auto-fetches a Let's Encrypt cert for the public
# hostname; no separate certbot to maintain.
#
# Install:
#   sudo apt install caddy            # or `brew install caddy` on macOS
#   sudo cp deploy/caddy.example.conf /etc/caddy/Caddyfile
#   sudoedit /etc/caddy/Caddyfile     # replace backend.example.com
#   sudo systemctl reload caddy
#
# Verify HTTP/2 is live:
#   curl -sIv https://backend.example.com/api/health 2>&1 \
#     | grep -E '^(HTTP|>) '
#   # → look for `HTTP/2 200`
#
# Verify large body downloads multiplex:
#   curl -o /dev/null -w '%{http_version} %{time_total}\n' \
#     https://backend.example.com/api/sequences/<name>/cache/splats.gsq
#   # → `2 ...` (HTTP/2)

backend.example.com {
	# Reverse proxy to the loopback uvicorn process. Caddy talks HTTP/1.1
	# upstream — uvicorn doesn't accept HTTP/2 on the wire — but the
	# downstream browser sees HTTP/2. That's where the latency win is:
	# multiplexed streams + header compression on the SPA's per-tick
	# /state polls + the splats.gsq body.
	reverse_proxy 127.0.0.1:7869 {
		# Caddy passes Host + X-Forwarded-{For,Proto} to the upstream
		# automatically; only spell out the extras we need.
		# Range-request passthrough is on by default — DO NOT enable
		# any compressing middleware here or the streaming .gsq decode
		# path will break (Content-Length + per-frame byte offsets are
		# baked into the .gsq header at pack time).
		header_up X-Real-IP {remote_host}

		# Generous timeouts: a cold .gsq fetch is up to ~60s on a
		# cross-region link. The browser is willing to wait that long;
		# we don't want Caddy to kill the upstream stream.
		transport http {
			read_timeout 5m
			write_timeout 5m
			dial_timeout 10s
		}
	}

	# Caddy's default cert is Let's Encrypt for the public hostname. On
	# the dev box we expose Caddy on loopback only (no public DNS), so
	# use `tls internal` to get a self-signed root that the browser
	# accepts once you import it into your trust store. Toggle as needed.
	# tls internal

	# Access log to a separate file. Includes request line + duration —
	# useful for debugging HTTP/2 stream timing without spamming journalctl.
	log {
		output file /var/log/caddy/gsfluent-access.log
		format console
	}
}
