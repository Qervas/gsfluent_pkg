# Build + push the gsfluent backend Docker image to GHCR on push to
# main and tagged releases. Inputs to `run:` come from `env:` only —
# no untrusted user-controlled fields (issue/PR titles, commit
# messages, etc.) are interpolated into shell commands.

name: docker-backend

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "server/**"
      - "frontend/**"
      - "tools/**"
      - "docker/**"
      - ".github/workflows/docker-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "frontend/**"
      - "tools/**"
      - "docker/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gsfluent-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (PR — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          load: true
          tags: gsfluent-backend:pr-build
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push (main / tag)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Smoke test image
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -e
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="$IMAGE:sha-$SHORT_SHA"
          docker pull "$TAG"
          docker run -d --rm --name smoke -p 18080:8080 "$TAG"
          for i in $(seq 1 30); do
            if curl -fs http://localhost:18080/api/health > /dev/null; then
              echo "/api/health responded after ${i}s"
              docker stop smoke
              exit 0
            fi
            sleep 1
          done
          echo "/api/health never responded"
          docker logs smoke
          docker stop smoke
          exit 1
