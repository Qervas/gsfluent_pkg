name: ci (rebuild)

on:
  push:
    branches: [rebuild]
  pull_request:
    branches: [rebuild, main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

# Cancel in-progress runs for the same ref when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-config:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose YAML
        working-directory: infra
        env:
          POSTGRES_PASSWORD: test
          MINIO_ROOT_PASSWORD: test
          GRAFANA_ADMIN_PASSWORD: test
        run: |
          docker compose --profile v2 config --quiet
          echo "compose config OK"

      - name: Lint Caddyfile
        run: |
          docker run --rm -v "$PWD/infra/caddy:/etc/caddy" \
            caddy:2 caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  api-tests:
    name: api tests (pytest + testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install --no-cache-dir 'uv==0.5.*'

      - name: Install api dev deps
        working-directory: apps/api
        run: uv pip install --system -e '.[dev]'

      - name: Run pytest
        working-directory: apps/api
        run: pytest -v --tb=short

      - name: OpenAPI drift check (when committed)
        working-directory: apps/api
        run: |
          if [ -f openapi.json ]; then
            python scripts/export_openapi.py --check
          else
            echo "openapi.json not yet committed; first export will land in CI artifact"
          fi

  frontend-build:
    name: frontend build + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install deps
        working-directory: frontend2
        run: pnpm install --frozen-lockfile=false

      - name: Generate TanStack Router routes
        working-directory: frontend2
        run: pnpm exec tsr generate || true   # safe before any routes change

      - name: Typecheck
        working-directory: frontend2
        run: pnpm typecheck

      - name: Build
        working-directory: frontend2
        run: pnpm build

      - name: Upload SPA bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend2/dist
          retention-days: 7
