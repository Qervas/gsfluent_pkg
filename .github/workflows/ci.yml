name: ci (v2)

on:
  push:
    branches: [main, rebuild]
  pull_request:
    branches: [main, rebuild]
    paths-ignore:
      - 'docs/**'
      - '**.md'

# Cancel in-progress runs for the same ref when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-config:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose YAML
        working-directory: infra
        env:
          POSTGRES_PASSWORD: test
          MINIO_ROOT_PASSWORD: test
          GRAFANA_ADMIN_PASSWORD: test
        run: |
          docker compose --profile v2 config --quiet
          echo "compose config OK"

      - name: Lint Caddyfile
        run: |
          docker run --rm -v "$PWD/infra/caddy:/etc/caddy" \
            caddy:2 caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  api-tests:
    name: api tests (pytest + testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install --no-cache-dir 'uv==0.5.*'

      - name: Install api dev deps
        working-directory: apps/api
        run: uv pip install --system -e '.[dev]'

      - name: Run pytest
        working-directory: apps/api
        run: pytest -v --tb=short

      - name: OpenAPI drift check
        working-directory: apps/api
        run: |
          if [ -f openapi.json ]; then
            python scripts/export_openapi.py --check
          else
            echo "openapi.json not yet committed; skip"
          fi

  frontend-build:
    name: frontend build + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend2/package-lock.json

      - name: Install deps
        working-directory: frontend2
        run: npm ci

      - name: Generate TanStack Router routes
        working-directory: frontend2
        run: npx tsr generate || true

      - name: Typecheck
        working-directory: frontend2
        run: npm run typecheck

      - name: Build
        working-directory: frontend2
        run: npm run build

      - name: Upload SPA bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend2/dist
          retention-days: 7

  gsfluent-unit:
    name: gsfluent unit + protocol conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Pinned to 3.12 to match the unified <repo>/.venv built by
          # frontend/scripts/install.mjs. Older 3.10 worked when scipy/
          # zstandard weren't pinned core deps; now they are, and 3.12
          # is the version where the lockfile is exercised in dev.
          python-version: '3.12'

      - name: Install gsfluent dev deps
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run unit + conformance tests
        working-directory: server
        run: |
          PYTHONPATH=. pytest \
            tests/protocols/ tests/observability/ tests/core/ \
            tests/codecs/ tests/sim_engines/ tests/storage/ \
            tests/fusers/ tests/runs/ tests/api/ \
            tests/test_config.py tests/test_composition.py \
            -v --tb=short

      - name: Re-run baseline tests (no-regression gate)
        working-directory: server
        run: |
          PYTHONPATH=. pytest \
            tests/test_cells.py tests/test_coord_convert.py \
            tests/test_frame_stream.py tests/test_health.py \
            tests/test_library_smoke.py tests/test_models.py \
            tests/test_recipes.py tests/test_runner.py \
            tests/test_runs_api.py tests/test_schemas.py \
            tests/test_sequences_import.py tests/test_zup_invariant.py \
            -v --tb=short

  gsfluent-integration:
    name: gsfluent integration (mock_sim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Pinned to 3.12 to match the unified <repo>/.venv built by
          # frontend/scripts/install.mjs. Older 3.10 worked when scipy/
          # zstandard weren't pinned core deps; now they are, and 3.12
          # is the version where the lockfile is exercised in dev.
          python-version: '3.12'

      - name: Install gsfluent dev deps
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run integration tests (uses mock_sim.sh, no GPU required)
        working-directory: server
        run: PYTHONPATH=. pytest tests/integration/ -v --tb=short

  gsfluent-lint:
    name: gsfluent ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Pinned to 3.12 to match the unified <repo>/.venv built by
          # frontend/scripts/install.mjs. Older 3.10 worked when scipy/
          # zstandard weren't pinned core deps; now they are, and 3.12
          # is the version where the lockfile is exercised in dev.
          python-version: '3.12'

      - name: Install gsfluent dev deps
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: ruff check
        working-directory: server
        run: ruff check gsfluent/ tests/

  gsfluent-typecheck:
    name: gsfluent mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Pinned to 3.12 to match the unified <repo>/.venv built by
          # frontend/scripts/install.mjs. Older 3.10 worked when scipy/
          # zstandard weren't pinned core deps; now they are, and 3.12
          # is the version where the lockfile is exercised in dev.
          python-version: '3.12'

      - name: Install gsfluent dev deps
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: mypy --strict gsfluent/ (scoped to bulletproofing-slice modules)
        working-directory: server
        run: mypy
