<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>gsfluent v2 — render-session test client</title>
  <style>
    body { font: 14px system-ui; margin: 1em; max-width: 900px; }
    label { display: block; margin: 0.5em 0; }
    input, button { font: inherit; padding: 0.3em 0.6em; }
    input { width: 22em; }
    pre { background: #111; color: #ddd; padding: 0.8em; border-radius: 4px;
          font-size: 12px; max-height: 240px; overflow: auto; }
    video { width: 100%; max-width: 640px; background: #000; border: 1px solid #444; }
    .row { display: flex; gap: 1em; align-items: flex-start; }
    .col { flex: 1; }
  </style>
</head>
<body>
  <h1>gsfluent v2 render test client</h1>
  <p>Dev-only. Lets you create a render session against the API and watch the
  server-rendered test pattern (Phase 5 scaffold) or splat scene (Task 5.5+).</p>

  <label>API base
    <input id="api" value="http://localhost:8869" />
  </label>
  <label>Run id (or leave blank to use model id below)
    <input id="run_id" placeholder="uuid" />
  </label>
  <label>Model id (used iff run id is empty)
    <input id="model_id" placeholder="uuid" />
  </label>

  <button id="start">Start session</button>
  <button id="stop" disabled>Stop</button>

  <div class="row" style="margin-top: 1em">
    <div class="col">
      <h3>Stream</h3>
      <video id="video" autoplay playsinline></video>
    </div>
    <div class="col">
      <h3>Log</h3>
      <pre id="log"></pre>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
const log = msg => { $('log').textContent += `[${new Date().toISOString().slice(11,19)}] ${msg}\n`; };
let pc = null, ws = null, sessionId = null;

async function start() {
  $('start').disabled = true; $('stop').disabled = false;
  const apiBase = $('api').value.replace(/\/$/, '');
  const runId = $('run_id').value.trim();
  const modelId = $('model_id').value.trim();
  if (!runId && !modelId) { log('need run_id or model_id'); return stop(); }

  // 1) POST /v1/render-sessions
  const body = runId ? { run_id: runId } : { model_id: modelId };
  const createResp = await fetch(apiBase + '/v1/render-sessions', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!createResp.ok) { log('create failed: ' + await createResp.text()); return stop(); }
  const { session_id, ice_servers } = await createResp.json();
  sessionId = session_id;
  log('session_id=' + session_id);

  // 2) Open WS to listen for remote ICE candidates fanned out via /v1/stream.
  const wsUrl = apiBase.replace(/^http/, 'ws') + '/v1/stream';
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    ws.send(JSON.stringify({ subscribe: [`events:render-session:${session_id}`] }));
    log('ws subscribed');
  };
  ws.onmessage = async ev => {
    const e = JSON.parse(ev.data);
    if (e.type === 'webrtc.candidate' && pc) {
      try { await pc.addIceCandidate(e.candidate); } catch (err) { log('addIceCandidate: ' + err); }
    } else if (e.type === 'render-session.state' && e.state === 'closed') {
      log('server closed'); stop();
    }
  };

  // 3) Build peer + transceiver for inbound video; send our offer.
  pc = new RTCPeerConnection({ iceServers: ice_servers || [] });
  pc.addTransceiver('video', { direction: 'recvonly' });
  pc.ontrack = ev => { $('video').srcObject = ev.streams[0]; log('track: ' + ev.track.kind); };
  pc.onicecandidate = async ev => {
    if (!ev.candidate) return;
    await fetch(`${apiBase}/v1/render-sessions/${session_id}/candidate`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        candidate: ev.candidate.candidate,
        sdpMid: ev.candidate.sdpMid,
        sdpMLineIndex: ev.candidate.sdpMLineIndex,
      }),
    });
  };
  pc.onconnectionstatechange = () => log('pc.state=' + pc.connectionState);

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  const offerResp = await fetch(`${apiBase}/v1/render-sessions/${session_id}/offer`, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ sdp: offer.sdp, type: offer.type }),
  });
  if (!offerResp.ok) { log('offer failed: ' + await offerResp.text()); return stop(); }
  const answer = await offerResp.json();
  await pc.setRemoteDescription(answer);
  log('answer received, awaiting media');
}

async function stop() {
  if (pc) { try { pc.close(); } catch {} pc = null; }
  if (ws) { try { ws.close(); } catch {} ws = null; }
  if (sessionId) {
    fetch(`${$('api').value.replace(/\/$/, '')}/v1/render-sessions/${sessionId}`,
      { method: 'DELETE' }).catch(() => {});
    sessionId = null;
  }
  $('start').disabled = false; $('stop').disabled = true;
}

$('start').addEventListener('click', () => start().catch(e => log('error: ' + e)));
$('stop').addEventListener('click', stop);
</script>
</body>
</html>
